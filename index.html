<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Marcador de Cornhole en tiempo real para móvil y proyector."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cornhole" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml" />
    <title>Cornhole Scorekeeper</title>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get('p');

        if (!redirectPath) {
          return;
        }

        var basePath = window.location.pathname.replace(/\/$/, '');
        var originalQuery = params.get('q');
        var nextUrl =
          basePath +
          redirectPath +
          (originalQuery ? '?' + originalQuery : '') +
          window.location.hash;

        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
